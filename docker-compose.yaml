services:
  db:
    image: ankane/pgvector:v0.5.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: diagrams_local
      POSTGRES_USER: diagrams
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagrams -d diagrams_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-service:
    build:
      context: ./services/python
    ports:
      - "50051:50051"
    env_file:
      - ./services/python/.env.local
    depends_on:
      db:
        condition: service_healthy

  laravel-api:
    build:
      context: ./services/laravel
    ports:
      - "8000:8000"
    env_file:
      - ./services/laravel/.env.local
    depends_on:
      db:
        condition: service_healthy
      python-service:
        condition: service_started
