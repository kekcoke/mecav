services:
  db:
    image: ankane/pgvector:v0.5.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: diagrams_local
      POSTGRES_USER: diagrams
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagrams -d diagrams_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-service:
    build:
      context: .
      dockerfile: ./services/python/Dockerfile
    ports:
      - "50051:50051"
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  laravel-api:
    build:
      context: .
      dockerfile: ./services/laravel/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
